pagination:
  default_limit: 50
  hard_cap: 500
  target_response_bytes: 2097152

socketio:
  ping_interval: 30
  ping_timeout: 120
  cors_allowed_origins: "*"

autoindex:
  enabled: true

access_control:
  enabled: true
  allowed_networks:
    - 127.0.0.1/32
    - 192.168.2.0/24

logging:
  client_log:
    path: logs/client.log
    max_bytes: 10485760
    backup_count: 5

# 下载队列配置
download:
  enable_queue: true                    # 是否启用下载队列
  max_concurrent_downloads: 5           # 最多同时进行的下载数
  timeout_seconds: 300                  # 单个下载超时时间（秒）
